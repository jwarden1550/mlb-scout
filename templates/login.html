<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Scout — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #0a1628;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #112240;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-card h1 {
            font-size: 2rem;
            color: #c8a44a;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            text-align: center;
            color: #8a9ab5;
            font-size: 0.9rem;
            margin-bottom: 36px;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #8a9ab5;
            margin-bottom: 8px;
        }

        .field input {
            width: 100%;
            padding: 12px 16px;
            background: #0a1628;
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            color: #e8e8e8;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: #c8a44a;
        }

        .field input::placeholder {
            color: #4a5a70;
        }

        .error-msg {
            background: rgba(224, 90, 90, 0.12);
            border: 1px solid rgba(224, 90, 90, 0.4);
            border-radius: 6px;
            color: #e05a5a;
            font-size: 0.9rem;
            padding: 10px 14px;
            margin-bottom: 20px;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: #c8a44a;
            color: #0a1628;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: inherit;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #e0b85a;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>MLB Scout</h1>
        <p class="subtitle">Sign in to access scouting reports</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required />
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required />
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>
</body>
</html>
