<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Scouting Report Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: #0a1628;
            color: #e8e8e8;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #c8a44a;
            padding-bottom: 24px;
        }

        header h1 {
            font-size: 2rem;
            color: #c8a44a;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        header p {
            color: #8a9ab5;
            font-size: 0.95rem;
        }

        .search-section {
            background: #112240;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .search-section label {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #8a9ab5;
            margin-bottom: 10px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-row input {
            flex: 1;
            padding: 12px 16px;
            background: #0a1628;
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            color: #e8e8e8;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row input:focus {
            border-color: #c8a44a;
        }

        .input-row input::placeholder {
            color: #4a5a70;
        }

        .input-row button {
            padding: 12px 28px;
            background: #c8a44a;
            color: #0a1628;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: inherit;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .input-row button:hover {
            background: #e0b85a;
        }

        .input-row button:disabled {
            background: #4a5a70;
            cursor: not-allowed;
        }

        .status {
            margin-top: 14px;
            font-size: 0.9rem;
            color: #8a9ab5;
            min-height: 20px;
        }

        .status.error {
            color: #e05a5a;
        }

        .report-section {
            display: none;
            background: #112240;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 32px;
        }

        .report-section.visible {
            display: block;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #1e3a5f;
        }

        .report-header h2 {
            font-size: 1.3rem;
            color: #c8a44a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .report-body {
            line-height: 1.8;
            color: #ccd6e8;
            font-size: 0.95rem;
        }

        .report-body h1,
        .report-body h2,
        .report-body h3 {
            color: #c8a44a;
            margin: 20px 0 8px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .report-body p {
            margin-bottom: 12px;
        }

        .report-body strong {
            color: #e8e8e8;
        }

        .report-body ul {
            margin: 8px 0 12px 20px;
        }

        .report-body li {
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MLB Scouting Report Generator</h1>
            <p>Enter a player name to generate a professional scouting report</p>
        </header>

        <div class="search-section">
            <label for="playerInput">Player Name</label>
            <div class="input-row">
                <input
                    type="text"
                    id="playerInput"
                    placeholder="e.g. Shohei Ohtani, Aaron Judge, Freddie Freeman"
                    autocomplete="off"
                />
                <button id="generateBtn" onclick="generateReport()">Generate Report</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="report-section" id="reportSection">
            <div class="report-header">
                <h2 id="reportTitle">Scouting Report</h2>
            </div>
            <div class="report-body" id="reportBody"></div>
        </div>
    </div>

    <script>
        document.getElementById("playerInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") generateReport();
        });

        function setStatus(message, isError = false) {
            const status = document.getElementById("status");
            status.textContent = message;
            status.className = "status" + (isError ? " error" : "");
        }

        function formatReport(text) {
            const lines = text.split('\n');
            let html = '';
            for (const line of lines) {
                if (line.startsWith('### ')) {
                    html += `<h3>${line.slice(4)}</h3>`;
                } else if (line.startsWith('## ')) {
                    html += `<h2>${line.slice(3)}</h2>`;
                } else if (line.startsWith('# ')) {
                    html += `<h1>${line.slice(2)}</h1>`;
                } else if (line.startsWith('- ')) {
                    html += `<ul><li>${line.slice(2).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</li></ul>`;
                } else if (line.trim() === '') {
                    html += '<br>';
                } else {
                    html += `<p>${line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</p>`;
                }
            }
            return html;
        }

        async function generateReport() {
            const input = document.getElementById("playerInput");
            const btn = document.getElementById("generateBtn");
            const reportSection = document.getElementById("reportSection");
            const reportTitle = document.getElementById("reportTitle");
            const reportBody = document.getElementById("reportBody");

            const playerName = input.value.trim();
            if (!playerName) {
                setStatus("Please enter a player name.", true);
                return;
            }

            btn.disabled = true;
            reportSection.classList.remove("visible");
            setStatus("Searching for player...");

            try {
                setStatus("Fetching stats and generating report. This may take 10-15 seconds...");

                const response = await fetch("/scout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ player_name: playerName })
                });

                let data;
                try {
                    data = await response.json();
                } catch {
                    setStatus("The server took too long to respond. Please try again.", true);
                    return;
                }

                if (!response.ok) {
                    setStatus(data.error || "Something went wrong.", true);
                    return;
                }

                reportTitle.textContent = "Scouting Report: " + data.player_name;
                reportBody.innerHTML = formatReport(data.report);
                reportSection.classList.add("visible");
                setStatus("");

            } catch (err) {
                setStatus("Could not connect to the server. Make sure the app is running.", true);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
