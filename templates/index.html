<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Scouting Report Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background-color: #0a1628;
            color: #e8e8e8;
            min-height: 100vh;
        }

        /* ── Nav ── */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            height: 56px;
            background: #0d1e38;
            border-bottom: 1px solid #1e3a5f;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .nav-brand {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #c8a44a;
            text-decoration: none;
        }
        .dropdown { position: relative; }
        .dropdown-toggle {
            background: transparent;
            border: 1px solid #1e3a5f;
            color: #e8e8e8;
            font-family: inherit;
            font-size: 0.9rem;
            padding: 7px 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .dropdown-toggle:hover { border-color: #c8a44a; color: #c8a44a; }
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: #112240;
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            min-width: 160px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .dropdown:hover .dropdown-menu,
        .dropdown-toggle:focus + .dropdown-menu { display: block; }
        .dropdown-menu a {
            display: block;
            padding: 11px 18px;
            color: #ccd6e8;
            text-decoration: none;
            font-size: 0.88rem;
            transition: background 0.15s, color 0.15s;
        }
        .dropdown-menu a:hover { background: #1e3a5f; color: #c8a44a; }
        .dropdown-menu a.danger { color: #e05a5a; }
        .dropdown-menu a.danger:hover { background: #2a1010; color: #e05a5a; }

        /* ── Page ── */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 2px solid #c8a44a;
            padding-bottom: 24px;
        }
        header h1 {
            font-size: 2rem;
            color: #c8a44a;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        header p { color: #8a9ab5; font-size: 0.95rem; }

        /* ── 20-80 Scale ── */
        .scale-card {
            background: #112240;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 18px 24px;
            margin-bottom: 24px;
        }
        .scale-title {
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #8a9ab5;
            margin-bottom: 12px;
        }
        .scale-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chip {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .chip-20 { background: #4a0a0a; color: #ff6b6b; border: 1px solid #7a1a1a; }
        .chip-30 { background: #4a2a0a; color: #ff9a3c; border: 1px solid #7a4a1a; }
        .chip-40 { background: #3a3a0a; color: #f0c040; border: 1px solid #6a6a1a; }
        .chip-50 { background: #1a3a1a; color: #6dd56d; border: 1px solid #2a6a2a; }
        .chip-60 { background: #0a3a2a; color: #3de8a0; border: 1px solid #1a6a4a; }
        .chip-70 { background: #0a2a4a; color: #40b0f0; border: 1px solid #1a5a8a; }
        .chip-80 { background: #2a0a4a; color: #c080ff; border: 1px solid #5a2a8a; }

        /* ── Search ── */
        .search-section {
            background: #112240;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 32px;
        }
        .search-section label {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #8a9ab5;
            margin-bottom: 10px;
        }
        .input-row { display: flex; gap: 12px; }
        .input-row input {
            flex: 1;
            padding: 12px 16px;
            background: #0a1628;
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            color: #e8e8e8;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: #c8a44a; }
        .input-row input::placeholder { color: #4a5a70; }
        .input-row button {
            padding: 12px 28px;
            background: #c8a44a;
            color: #0a1628;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: inherit;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .input-row button:hover { background: #e0b85a; }
        .input-row button:disabled { background: #4a5a70; cursor: not-allowed; }
        .status { margin-top: 14px; font-size: 0.9rem; color: #8a9ab5; min-height: 20px; }
        .status.error { color: #e05a5a; }

        /* ── Report ── */
        .report-section {
            display: none;
            background: #112240;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 32px;
        }
        .report-section.visible { display: block; }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #1e3a5f;
        }
        .report-header h2 { font-size: 1.3rem; color: #c8a44a; text-transform: uppercase; letter-spacing: 1px; }
        .watch-btn {
            padding: 7px 16px;
            background: transparent;
            color: #c8a44a;
            border: 1px solid #c8a44a;
            border-radius: 5px;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .watch-btn:hover { background: #c8a44a; color: #0a1628; }
        .report-body { line-height: 1.8; color: #ccd6e8; font-size: 0.95rem; }
        .report-body h1, .report-body h2, .report-body h3 {
            color: #c8a44a; margin: 20px 0 8px; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .report-body p { margin-bottom: 12px; }
        .report-body strong { color: #e8e8e8; }
        .report-body ul { margin: 8px 0 12px 20px; }
        .report-body li { margin-bottom: 6px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a class="nav-brand" href="/">MLB Scout</a>
        <div class="dropdown">
            <button class="dropdown-toggle">{{ username }} ▾</button>
            <div class="dropdown-menu">
                <a href="/reports">Saved Reports</a>
                <a href="/watchlist">Watch List</a>
                <a href="/logout" class="danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>MLB Scouting Report Generator</h1>
            <p>Enter a player name to generate a professional scouting report</p>
        </header>

        <div class="scale-card">
            <div class="scale-title">MLB Scouting Scale (20–80)</div>
            <div class="scale-chips">
                <span class="chip chip-20">20 — Poor</span>
                <span class="chip chip-30">30 — Well Below Avg</span>
                <span class="chip chip-40">40 — Below Avg</span>
                <span class="chip chip-50">50 — Average (MLB Starter)</span>
                <span class="chip chip-60">60 — Plus</span>
                <span class="chip chip-70">70 — Plus-Plus</span>
                <span class="chip chip-80">80 — Elite</span>
            </div>
        </div>

        <div class="search-section">
            <label for="playerInput">Player Name</label>
            <div class="input-row">
                <input type="text" id="playerInput"
                    placeholder="e.g. Shohei Ohtani, Aaron Judge, Freddie Freeman"
                    autocomplete="off" />
                <button id="generateBtn" onclick="generateReport()">Generate Report</button>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="report-section" id="reportSection">
            <div class="report-header">
                <h2 id="reportTitle">Scouting Report</h2>
                <button class="watch-btn" id="watchBtn" onclick="addToWatchlist()" style="display:none">+ Watch List</button>
            </div>
            <div class="report-body" id="reportBody"></div>
        </div>
    </div>

    <script>
        let currentPlayerName = '';

        document.getElementById("playerInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") generateReport();
        });

        function setStatus(message, isError = false) {
            const status = document.getElementById("status");
            status.textContent = message;
            status.className = "status" + (isError ? " error" : "");
        }

        function formatReport(text) {
            const lines = text.split('\n');
            let html = '';
            for (const line of lines) {
                if (line.startsWith('### ')) html += `<h3>${line.slice(4)}</h3>`;
                else if (line.startsWith('## ')) html += `<h2>${line.slice(3)}</h2>`;
                else if (line.startsWith('# ')) html += `<h1>${line.slice(2)}</h1>`;
                else if (line.startsWith('- ')) html += `<ul><li>${line.slice(2).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</li></ul>`;
                else if (line.trim() === '') html += '<br>';
                else html += `<p>${line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</p>`;
            }
            return html;
        }

        async function generateReport() {
            const input = document.getElementById("playerInput");
            const btn = document.getElementById("generateBtn");
            const reportSection = document.getElementById("reportSection");
            const reportTitle = document.getElementById("reportTitle");
            const reportBody = document.getElementById("reportBody");
            const watchBtn = document.getElementById("watchBtn");

            const playerName = input.value.trim();
            if (!playerName) { setStatus("Please enter a player name.", true); return; }

            btn.disabled = true;
            reportSection.classList.remove("visible");
            watchBtn.style.display = 'none';
            setStatus("Fetching stats and generating report. This may take 10-15 seconds...");

            try {
                const response = await fetch("/scout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ player_name: playerName })
                });

                let data;
                try { data = await response.json(); }
                catch { setStatus("The server took too long to respond. Please try again.", true); return; }

                if (!response.ok) { setStatus(data.error || "Something went wrong.", true); return; }

                currentPlayerName = data.player_name;
                reportTitle.textContent = "Scouting Report: " + data.player_name;
                reportBody.innerHTML = formatReport(data.report);
                reportSection.classList.add("visible");
                watchBtn.style.display = 'inline-block';
                setStatus(data.cached ? "Loaded from cache." : "");

            } catch (err) {
                setStatus("Could not connect to the server.", true);
            } finally {
                btn.disabled = false;
            }
        }

        async function addToWatchlist() {
            const btn = document.getElementById("watchBtn");
            btn.disabled = true;
            btn.textContent = "Adding...";
            try {
                const response = await fetch("/watchlist/add", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ player_name: currentPlayerName })
                });
                const data = await response.json();
                if (response.ok) {
                    btn.textContent = "✓ Watching";
                    btn.style.background = "#c8a44a";
                    btn.style.color = "#0a1628";
                } else {
                    btn.textContent = data.error || "Error";
                    btn.disabled = false;
                }
            } catch {
                btn.textContent = "+ Watch List";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
